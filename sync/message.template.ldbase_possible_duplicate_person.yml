template: ldbase_possible_duplicate_person
label: 'LDbase Possible Duplicate Person Record Found'
description: 'Message sent from the system when a possible duplicate person record is found'
text:
  -
    value: "<p>LDbase Notification: Possible Account Match Found</p>\r\n"
    format: basic_html
  -
    value: '<p>A researcher added data to LDbase, and it looks like they might have mentioned you as a contributor.</p><p>Please go to <a href="@possible_matches_link">@possible_matches_link</a> to review it. <span>You will be able to ACCEPT that you are the person that contributed to their research, or you can REJECT it if you are not the person that contributed to their research. Accepting will display this content on your personal LDbase Contributions page and will ensure your name appears correctly when others cite this research. Please note that how your name is cited can be updated/changed by going to your LDbase Dashboard and clicking “Edit your profile.”</span></p><p><span>This is an automated message from the LDbase repository. Feel free to email us at&nbsp;</span><a href="mailto:LDbase@fcrr.org">LDbase@fcrr.org</a><span>&nbsp;with any questions. Thank you for being a part of the LDbase community!&nbsp;</span></p>'
    format: basic_html
settings:
  'token options':
    clear: true
    'token replace': true
  purge_override: false
  purge_methods: {  }
